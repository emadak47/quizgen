<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Quizgen{% endblock %}</title>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;1,200;1,300;1,400;1,500&family=Azeret+Mono:wght@300;400;500&display=swap" as="style">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;1,200;1,300;1,400;1,500&family=Azeret+Mono:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <!-- Background layers (present on every page) -->
  <div class="stains">
    <div class="stain w" style="width:450px;height:380px;top:-8%;left:-12%"></div>
    <div class="stain c" style="width:350px;height:300px;bottom:-5%;right:-10%;transform:rotate(15deg)"></div>
    <div class="stain w" style="width:250px;height:220px;top:40%;right:-8%"></div>
    <div class="stain c" style="width:400px;height:340px;bottom:10%;left:-8%;transform:rotate(-10deg)"></div>
  </div>
  <div class="bloom"></div>
  <div class="star-field" id="field"></div>
  <div class="grain"></div>

  <!-- Page content -->
  <div class="layout">
    <div class="spine"></div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>

  <script src="/static/js/constellation.js"></script>
  <script src="/static/js/ui.js"></script>
</body>
</html>
