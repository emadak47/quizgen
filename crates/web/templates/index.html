{% extends "base.html" %}
{% block title %}Quizgen — Start{% endblock %}
{% block content %}
<div class="land-title">Quizgen</div>
<div class="land-sub">vocabulary</div>
<div class="land-divider"></div>
<form method="post" action="/quiz/start">
  <div class="field-group">
    <div class="field-label">type</div>
    <div class="type-options">
      <label class="type-option sel">
        <input type="radio" name="quiz_type" value="synonyms" checked>
        <div class="type-option-frame"></div>
        <span class="type-option-text">synonyms</span>
      </label>
      <label class="type-option">
        <input type="radio" name="quiz_type" value="antonyms">
        <div class="type-option-frame"></div>
        <span class="type-option-text">antonyms</span>
      </label>
      <label class="type-option">
        <input type="radio" name="quiz_type" value="definitions">
        <div class="type-option-frame"></div>
        <span class="type-option-text">definitions</span>
      </label>
      <label class="type-option">
        <input type="radio" name="quiz_type" value="examples">
        <div class="type-option-frame"></div>
        <span class="type-option-text">examples</span>
      </label>
    </div>
  </div>
  <div class="field-group field-group-input">
    <div class="field-label">questions</div>
    <input class="field-input" type="number" name="length" value="10" min="1" max="50">
  </div>
  <button type="submit" class="land-btn">
    <span>begin</span><span class="signal-line"></span><span>→</span>
  </button>
</form>
{% endblock %}
