<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Quizgen{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.6;
            color: #1a1a1a;
        }
        h1, h2 { margin-bottom: 1rem; }
        form { margin: 1rem 0; }
        label { display: block; margin: 0.5rem 0 0.25rem; font-weight: 600; }
        select, input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        .choice-label {
            display: block;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }
        .choice-label:hover { background: #f0f0f0; }
        .correct { color: #16a34a; }
        .incorrect { color: #dc2626; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
